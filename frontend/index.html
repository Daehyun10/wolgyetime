<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>월계고 전용 익명게시판</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

    <!-- ✅ PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ✅ iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="월계고" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ✅ 파비콘 -->
    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" />

    <!-- ✅ 다크모드 깜빡임 방지: React 로드 전에 즉시 실행 -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        var fontSize = parseInt(localStorage.getItem('fontSize') || '14');
        document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
        document.documentElement.style.fontSize = ((fontSize / 16) * 100) + '%';
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
